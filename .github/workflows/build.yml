name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
      - name: Run unit tests
        run: gradle test
      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/

  instrumented-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          script: gradle connectedAndroidTest
      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/

  build-and-release:
    runs-on: ubuntu-latest
    needs: [unit-test, instrumented-test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
      - name: Build debug APK
        run: gradle assembleDebug -PversionCode=${{ github.run_number }}
      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk fog-alarm.apk
      - name: Delete old latest release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create versioned release
        run: |
          gh release create "v${{ github.run_number }}" \
            --title "Build ${{ github.run_number }}" \
            --notes "Commit: ${{ github.sha }}" \
            fog-alarm.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag as latest
        run: |
          gh release create latest \
            --title "Latest (Build ${{ github.run_number }})" \
            --notes "See v${{ github.run_number }} — built from ${{ github.sha }}" \
            fog-alarm.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
